{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height:75vh;">

    <div class="card shadow-lg p-4" style="width:400px; border-radius:15px;">

        <h3 class="text-center mb-3">✏️ Edit Profile</h3>

        <hr>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" value="{{ user[0] }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" value="{{ user[1] }}" class="form-control" disabled>
            </div>

            <button class="btn btn-primary w-100">Update Profile</button>

        </form>

    </div>

</div>

{% endblock %}
