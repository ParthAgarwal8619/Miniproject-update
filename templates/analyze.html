{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Email Analysis</h2>

<form method="POST">

<textarea
name="email"
placeholder="Paste customer email here..."
required></textarea>

<button type="submit" class="btn">

Analyze Email

</button>

</form>


{% if error %}

<p class="error">{{error}}</p>

{% endif %}


{% if result %}

<div class="result">

<h3>Analysis Result</h3>

<p>{{result}}</p>

</div>

{% endif %}

</div>

{% endblock %}
