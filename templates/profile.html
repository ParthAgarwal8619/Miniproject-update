{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height:75vh;">

    <div class="card shadow-lg p-4 text-center" style="width:400px; border-radius:15px;">

        <h3 class="mb-3">👤 My Profile</h3>

        <hr>

        <p><strong>Name:</strong> {{ user[0] }}</p>
        <p><strong>Email:</strong> {{ user[1] }}</p>
        <p>
            <strong>Role:</strong> 
            <span class="badge {% if user[2]=='admin' %}bg-success{% else %}bg-secondary{% endif %}">
                {{ user[2] }}
            </span>
        </p>

        <div class="mt-3">
            <a href="/edit-profile" class="btn btn-primary w-100">Edit Profile</a>
        </div>

    </div>

</div>

{% endblock %}
