{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Email History</h2>

<div class="card p-4">

<table class="table table-striped">

<thead>

<tr>
<th>Email</th>
<th>Category</th>
<th>Sentiment</th>
<th>Priority</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for row in rows %}

<tr>

<td>{{row.email}}</td>
<td>{{row.category}}</td>
<td>{{row.sentiment}}</td>
<td>{{row.priority}}</td>

<td>

<a href="/edit/{{row.id}}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete/{{row.id}}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
